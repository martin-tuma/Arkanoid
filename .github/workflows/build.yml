name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore Arkanoid.sln

      - name: Build
        run: msbuild Arkanoid.sln /p:Configuration=Release /p:Platform=Win32 /p:PlatformToolset=v143

      - name: Kopírování assetů do výstupní složky
        run: xcopy /E /I /Y Arkanoid\images Release\images

      - name: Upload artefaktu
        uses: actions/upload-artifact@v4
        with:
          name: Arkanoid-Release
          path: |
            Release\Arkanoid.exe
            Release\*.dll
            Release\images\
